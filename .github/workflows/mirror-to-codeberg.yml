name: Mirror to Codeberg

on:
  push:
    branches: [ "main" ]
  delete:
    branches: [ "*" ]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to Codeberg
        run: |
          git remote add codeberg https://lucidrains:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/lucidrains/${{ github.event.repository.name }}.git
          git push -u codeberg --all --force
          git push -u codeberg --tags --force
